<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superfarma - Movimentações</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --success: #10b981;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --info: #3b82f6;
            --info-light: #dbeafe;
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-elevated: #252542;
            --border: #2d2d4a;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.4);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.5);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-primary); 
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        header { 
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-elevated) 100%);
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: var(--shadow);
        }

        .brand-text h1 { 
            font-size: 1.25rem; 
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-text span {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Navigation */
        nav {
            display: flex;
            gap: 8px;
        }

        nav a {
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        nav a:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        nav a.active {
            background: var(--primary);
            color: white;
        }

        #statusSync { 
            display: flex; 
            align-items: center; 
            gap: 8px;
            background: var(--bg-elevated);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        #statusSync .dot { 
            width: 8px; 
            height: 8px; 
            border-radius: 50%; 
            background: var(--text-muted);
            transition: all 0.3s ease;
        }

        #statusSync.online { 
            color: var(--success);
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.1);
        }

        #statusSync.online .dot { 
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Container */
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 24px;
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
        }

        /* Card */
        .card { 
            background: var(--bg-card); 
            border-radius: var(--radius-lg); 
            padding: 24px; 
            border: 1px solid var(--border);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            background: rgba(16, 185, 129, 0.15);
        }

        .card h2 { 
            font-size: 1.1rem; 
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Filters */
        .filters-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group input, .filter-group select {
            background: var(--bg-elevated); 
            color: var(--text-primary); 
            border: 1px solid var(--border); 
            border-radius: var(--radius-sm); 
            padding: 10px 12px; 
            font-size: 0.9rem; 
            width: 100%; 
            outline: none; 
            transition: all 0.2s ease;
        }

        .filter-group input:focus, .filter-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            padding-left: 38px;
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
            opacity: 0.6;
        }

        /* Filter Buttons */
        .filter-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-elevated);
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* Buttons */
        button { 
            border: none; 
            border-radius: var(--radius-sm); 
            padding: 10px 16px; 
            font-size: 0.85rem; 
            cursor: pointer; 
            font-weight: 600; 
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: inherit;
        }

        button:hover { 
            transform: translateY(-1px);
        }

        .btn-primary { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); 
            color: #fff;
        }

        .btn-secondary {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--text-primary);
        }

        .btn-danger { 
            background: linear-gradient(135deg, var(--danger) 0%, #dc2626 100%); 
            color: #fff; 
        }

        .btn-sm { 
            padding: 6px 12px; 
            font-size: 0.75rem;
        }

        /* Table */
        .table-container {
            overflow-x: auto;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 0.9rem;
        }

        thead {
            background: var(--bg-elevated);
        }

        th { 
            color: var(--text-secondary); 
            padding: 14px 16px; 
            text-align: left; 
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        td { 
            padding: 14px 16px; 
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:last-child td { 
            border-bottom: none; 
        }

        tbody tr {
            transition: background 0.2s ease;
        }

        tbody tr:hover { 
            background: var(--bg-elevated);
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        /* Results Bar */
        .results-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
        }

        .results-count {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .results-count .count {
            color: var(--primary);
            font-weight: 600;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        /* Summary Cards */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 8px;
        }

        .summary-card {
            background: var(--bg-elevated);
            border-radius: var(--radius-sm);
            padding: 16px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .summary-card .value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .summary-card .label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Overlay */
        #overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(15, 15, 26, 0.95);
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            z-index: 999;
            gap: 20px;
            backdrop-filter: blur(10px);
        }

        .spinner-container {
            position: relative;
            width: 60px;
            height: 60px;
        }

        .spinner {
            position: absolute;
            inset: 0;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .spinner-inner {
            position: absolute;
            inset: 8px;
            border: 3px solid var(--border);
            border-bottom-color: var(--primary-light);
            border-radius: 50%;
            animation: spin 0.8s linear infinite reverse;
        }

        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 12px 16px;
                flex-wrap: wrap;
                gap: 12px;
            }

            nav {
                order: 3;
                width: 100%;
                justify-content: center;
            }

            nav a {
                padding: 8px 12px;
                font-size: 0.8rem;
            }

            .filters-row {
                flex-direction: column;
            }

            .filter-group {
                min-width: 100%;
            }

            .container {
                padding: 16px;
            }

            th, td {
                padding: 12px;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* User Menu */
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-elevated);
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            font-size: 0.8rem;
        }

        .user-email {
            color: var(--text-secondary);
            max-width: 160px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .btn-logout {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.1);
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>

<div id="overlay">
    <div class="spinner-container">
        <div class="spinner"></div>
        <div class="spinner-inner"></div>
    </div>
    <p>Carregando movimentações...</p>
</div>

<header>
    <div class="brand">
        <div class="brand-icon">💊</div>
        <div class="brand-text">
            <h1>Superfarma</h1>
            <span>Sistema de Estoque</span>
        </div>
    </div>
    <nav>
        <a href="index.html">⚡ Operações</a>
        <a href="produtos.html">📦 Produtos</a>
        <a href="movimentacoes.html" class="active">🕐 Movimentações</a>
    </nav>
    <div class="header-right">
        <div id="statusSync">
            <div class="dot"></div>
            <span>Conectando...</span>
        </div>
        <div class="user-menu">
            <span>👤</span>
            <span class="user-email" id="userEmail"></span>
            <button class="btn-logout" onclick="logout()">Sair</button>
        </div>
    </div>
</header>

<div class="container">
    <!-- Summary Cards -->
    <div class="summary-cards" id="summaryCards"></div>

    <div class="card">
        <div class="card-header">
            <div class="card-title">
                <div class="card-icon">📋</div>
                <h2>Histórico de Movimentações</h2>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters-row">
            <div class="filter-group search-box">
                <label>Buscar</label>
                <input type="text" id="buscaHistorico" placeholder="Produto ou cliente..." autocomplete="off" />
            </div>
            <div class="filter-group">
                <label>Data Início</label>
                <input type="date" id="filtroDataInicio" />
            </div>
            <div class="filter-group">
                <label>Data Fim</label>
                <input type="date" id="filtroDataFim" />
            </div>
            <div class="filter-group">
                <label>&nbsp;</label>
                <button class="btn-secondary" onclick="limparFiltros()">
                    🗑️ Limpar
                </button>
            </div>
        </div>

        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filtrarPorTipo('todos')">Todos</button>
            <button class="filter-btn" onclick="filtrarPorTipo('ENTRADA')">📥 Entradas</button>
            <button class="filter-btn" onclick="filtrarPorTipo('VENDA')">📤 Vendas</button>
        </div>

        <div class="table-container" style="margin-top: 16px;">
            <table>
                <thead>
                    <tr>
                        <th>Data/Hora</th>
                        <th>Produto</th>
                        <th>Tipo</th>
                        <th>Qtd</th>
                        <th>Cliente</th>
                        <th>Usuário</th>                     <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="tabelaHistorico"></tbody>
            </table>
        </div>

        <div class="results-bar">
            <div class="results-count" id="contadorHistorico"></div>
        </div>
    </div>
</div>

<script>
    // ===== SUPABASE CONFIGURATION =====
    const { createClient } = window.supabase;
    const db = createClient(
        'https://gbdyfjidtmlundtepyaa.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdiZHlmamlkdG1sdW5kdGVweWFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NzU2NDcsImV4cCI6MjA5MDE1MTY0N30.uCuqSBfAkSX66TjwK7WAVp4GvzmNuSWxo-XNItZzCn8'
    );

    async function verificarAuth() {
        const { data: { session } } = await db.auth.getSession();
        if (!session) { window.location.href = 'login.html'; return false; }
        document.getElementById('userEmail').textContent = session.user.email;
        return true;
    }

    async function logout() {
        await db.auth.signOut();
        window.location.href = 'login.html';
    }

    let BD = { produtos: [], historico: [] };
    let historicoFiltrado = [];
    let filtroTipo = 'todos';

    function esconderOverlay() { 
        document.getElementById('overlay').style.display = 'none'; 
    }

    async function carregar() {
        try {
        const [{ data: prods }, { data: hist }] = await Promise.all([
            db.from('produtos').select('*'),
            db.from('historico').select('*').order('data', { ascending: false })
        ]);
        BD.produtos = prods || [];
        BD.historico = hist || [];
        historicoFiltrado = [...BD.historico];
        aplicarFiltros();
        atualizarSummary();
        } catch(err) { esconderOverlay(); alert('Erro ao carregar: ' + err.message); }
        }

    function configurarRealtime() {
        db.channel('estoque-movs')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'historico' }, () => carregar())
            .on('postgres_changes', { event: '*', schema: 'public', table: 'produtos' }, () => carregar())
            .subscribe(status => {
                const el = document.getElementById('statusSync');
                el.className = status === 'SUBSCRIBED' ? 'online' : '';
                el.querySelector('span').textContent = status === 'SUBSCRIBED' ? 'Sincronizado' : 'Reconectando...';
            });
    }

    async function desfazerMovimento(id) {
        if (!confirm('Deseja realmente desfazer esta movimentação?')) return;
        const mov = BD.historico.find(h => h.id == id);
        if (!mov) return;
        const prod = BD.produtos.find(p => p.nome === mov.produto);
        const saldoAtual = prod?.saldo || 0;
        const novoSaldo = mov.tipo === 'ENTRADA' ? Math.max(0, saldoAtual - mov.quantidade) : saldoAtual + mov.quantidade;
        const { error: e1 } = await db.from('produtos').update({ saldo: novoSaldo }).eq('nome', mov.produto);
        const { error: e2 } = await db.from('historico').delete().eq('id', String(id));
        if (e1 || e2) { alert('Erro ao desfazer: ' + (e1 || e2).message); return; }
            const { data: { session } } = await db.auth.getSession();
                const userEmail = session?.user?.email || '';
                await db.from('historico').insert({
                            id: Date.now(),
                            data: new Date().toISOString(),
                            produto: mov.produto,
                            tipo: 'DESFEITO',
                            quantidade: mov.quantidade,
                            cliente: mov.cliente || null,
                            usuario: userEmail
                                    });
        await carregar();
    }

    function filtrarPorTipo(tipo) {
        filtroTipo = tipo;
        document.querySelectorAll('.filter-buttons .filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        aplicarFiltros();
    }

    function aplicarFiltros() {
        const busca = document.getElementById('buscaHistorico').value.trim().toLowerCase();
        const dataInicio = document.getElementById('filtroDataInicio').value;
        const dataFim = document.getElementById('filtroDataFim').value;
        
        historicoFiltrado = BD.historico.filter(mov => {
            // Filtro por tipo
            const matchTipo = filtroTipo === 'todos' || mov.tipo === filtroTipo;
            
            // Filtro por texto
            const matchBusca = !busca || 
                mov.produto.toLowerCase().includes(busca) ||
                (mov.cliente && mov.cliente.toLowerCase().includes(busca));
            
            // Filtro por data
            const movData = new Date(mov.data);
            const matchDataInicio = !dataInicio || movData >= new Date(dataInicio + 'T00:00:00');
            const matchDataFim = !dataFim || movData <= new Date(dataFim + 'T23:59:59');
            
            return matchTipo && matchBusca && matchDataInicio && matchDataFim;
        });

        renderizarTabela();
    }

    function limparFiltros() {
        document.getElementById('buscaHistorico').value = '';
        document.getElementById('filtroDataInicio').value = '';
        document.getElementById('filtroDataFim').value = '';
        filtroTipo = 'todos';
        document.querySelectorAll('.filter-buttons .filter-btn').forEach((btn, i) => {
            btn.classList.toggle('active', i === 0);
        });
        historicoFiltrado = [...BD.historico];
        renderizarTabela();
    }

    function atualizarSummary() {
        const totalEntradas = BD.historico.filter(h => h.tipo === 'ENTRADA').reduce((sum, h) => sum + h.quantidade, 0);
        const totalVendas = BD.historico.filter(h => h.tipo === 'VENDA').reduce((sum, h) => sum + h.quantidade, 0);
        const totalMovs = BD.historico.length;
        
        document.getElementById('summaryCards').innerHTML = `
            <div class="summary-card">
                <div class="value" style="color:var(--success)">${totalEntradas}</div>
                <div class="label">Total Entradas</div>
            </div>
            <div class="summary-card">
                <div class="value" style="color:var(--danger)">${totalVendas}</div>
                <div class="label">Total Vendas</div>
            </div>
            <div class="summary-card">
                <div class="value" style="color:var(--primary)">${totalMovs}</div>
                <div class="label">Movimentações</div>
            </div>
        `;
    }

    function renderizarTabela() {
        const tbody = document.getElementById('tabelaHistorico');
        const contador = document.getElementById('contadorHistorico');
        
        if (historicoFiltrado.length === 0) { 
            tbody.innerHTML = `
                <tr>
                    <td colspan="7" class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>Nenhuma movimentação encontrada</h3>
                        <div>Tente ajustar os filtros de busca</div>
                    </td>
                </tr>`; 
            contador.innerHTML = `Mostrando <span class="count">0</span> de ${BD.historico.length} movimentações`;
            return; 
        }
        
        tbody.innerHTML = '';
        historicoFiltrado.forEach(mov => {
            const isEntrada = mov.tipo === 'ENTRADA';
            const tipoBadge = mov.tipo === 'ENTRADA'
                ? '<span class="badge badge-success"><span>↓</span> ENTRADA</span>'
                : mov.tipo === 'DESFEITO'
                    ? '<span class="badge" style="background:rgba(251,191,36,0.15);color:#f59e0b"><span>↩️</span> DESFEITO</span>'
                    : '<span class="badge badge-danger"><span>↑</span> VENDA</span>';
            const data = new Date(mov.data);
            const dataFormatada = data.toLocaleDateString('pt-BR') + ' ' + data.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            
            tbody.innerHTML += `
                <tr>
                    <td style="color:var(--text-secondary);white-space:nowrap">${dataFormatada}</td>
                    <td style="font-weight:500">${mov.produto}</td>
                    <td>${tipoBadge}</td>
                    <td style="font-weight:700">${mov.quantidade}</td>
                    <td style="color:${mov.cliente ? 'var(--text-primary)' : 'var(--text-muted)'}">${mov.cliente || '—'}</td>              <td style="color:var(--text-secondary);font-size:0.8rem">${mov.usuario || '—'}</td>
                                <td>
                ${mov.tipo !== 'DESFEITO' ? `<button class="btn-danger btn-sm" onclick="desfazerMovimento('${mov.id}')">↩️ Desfazer</button>` : '<span style="color:var(--text-muted);font-size:0.8rem">—</span>'}
            </td>
                        </tr>
        `;
        });
        
        contador.innerHTML = `Mostrando <span class="count">${historicoFiltrado.length}</span> de ${BD.historico.length} movimentações`;
    }

    // Event listeners
    document.getElementById('buscaHistorico').addEventListener('input', aplicarFiltros);
    document.getElementById('filtroDataInicio').addEventListener('change', aplicarFiltros);
    document.getElementById('filtroDataFim').addEventListener('change', aplicarFiltros);

    verificarAuth().then(ok => {
        if (ok) carregar().then(() => {
            esconderOverlay();
            configurarRealtime();
        });
    });
</script>
</body>
</html>
